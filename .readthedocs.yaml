version: 2

build:
  os: ubuntu-24.04
  tools:
    python: "3.13"
  jobs:
    install:
      # compiles the C++ extension (build deps come from [build-system])
      - pip install .
      # sphinx + theme from [dependency-groups] dev (needs pip >= 25.1)
      - pip install --upgrade pip
      - pip install --group dev

# CMake needs extern/pybind11
submodules:
  include: all
  recursive: true

sphinx:
  configuration: docs/source/conf.py
